<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Background Attachment</title>
    <style>
        .bg-image {
            background-image: url("https://www.climbing.com/wp-content/uploads/2025/10/Toadstool-Dane-Brooks-scaled.jpg");
            background-position: center center;
            height: 2000px;
        }
        
        .bg-cover {
            background-size: cover;
        }

        .bg-contain {
            background-size: contain;
        }

        .bg-no-repeat {
            background-repeat: no-repeat;
        }

        .bg-repeat {
            background-repeat: repeat;
        }

        .bg-fixed{
            background-attachment: fixed;
        }
    </style>
</head>
<body>
    <!-- background-reapting -->
    <div class="bg-image bg-contain bg-repeat bg-fixed">Background Image</div>
    <!-- <div class="bg-image bg-contain bg-no-repeat">Background Image</div> -->
</body>
</html>
