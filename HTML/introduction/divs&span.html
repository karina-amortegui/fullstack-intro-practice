 <!-- HTML STRUCTURE -->

 <!-- declares the document as HTML5 -->
 <!DOCTYPE html>
 <!-- html tag is the root element: everything inside the webpage goes inside -->
 <html>
    <!-- head tag contains metadata like the title  -->
    <head>
        <meta charset="UTF-8">
        <meta name="description" content="Learn HTML easily">
        <meta name="keywords" content="HTML, CSS, Javascript">
        <meta name="author" content="John Doe">
        <title>First Website</title>
    </head>
    <!-- body tag holds all visible content -->
    <body>
       <!-- header tags h1-h6 where h1 is largest and h6 is smallest -->
        <h1>Main Heading (h1)</h1>
        <h2>Sub Header (h2)</h2>
        <h3>Section title (h3)</h3>
        <h4>Smaller title (h4)</h4>
        <h5>Minor Heading (h5)</h5>
        <h6>Smallest Heading (h6)</h6>
        <!-- p tag for description -->
        <p>this is a paragraph tag (p)</p>

        <div style ="background-color: yellow; padding: 10px;">
            <h3>Div Section</h3>
            <p>This is a block level container using '< div >'.</p>
            <!-- blocks take up as much space as they can -->
        </div>

        <p>this text contains a <span style="color: yellow; background-color: black">highlighted word</span> using < span > tag</span></p>
        <!-- spans take a little space as possible -->
    </body>
 </html>
