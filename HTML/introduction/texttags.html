<!-- META TAGS & SEO -->

 <!-- declares the document as HTML5 -->
 <!DOCTYPE html>
 <!-- html tag is the root element: everything inside the webpage goes inside -->
 <html>
    <!-- head tag contains metadata like the title  -->
    <head>
        <meta charset="UTF-8">
        <meta name="description" content="Learn HTML easily">
        <meta name="keywords" content="HTML, CSS, Javascript">
        <meta name="author" content="John Doe">
        <title>First Website</title>
    </head>
    <!-- body tag holds all visible content -->
    <body>
        <h1>First Website</h1>
        <p>This website is going to be cool</p>
    </body>
 </html>
