<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewpoint" content="width=device-width, initial-scale=1.0" />
        <title>Semantic HTML</title>
    </head>
    <body>
        <header>
            <h1>My Website</h1>
            <nav>
                <ul>
                    <li><a href="#">Home</a></li>
                    <li><a href="#">Blog</a></li>
                    <li><a href="#">Contact</a></li>
                </ul>
            </nav>
            <main>
                <section>
                    <h2>About Us</h2>
                    <p>We build websites using clean HTML and CSS</p>
                </section>
                <article>
                    <h2>Latest Blog Post</h2>
                    <p>Understanding the importance of semantic HTML.</p>
                </article>
                <aside>
                    <h3>Sidebar</h3>
                    <p>Links to useful resources</p>
                </aside>
            </main>
            <footer>
                <p>&copy; 2026 My Website</p>
            </footer>
        </header>
    </body>
</html>


<!-- SEMANTIC TAGS -->
<!-- <header> defines teh top section of a webpage (like a website banner). -->
<!-- <nav> contains the navigation menu with links to other pages.  -->
<!-- <main> the primary content of the page (exluding sidebars or footers). -->
<!-- <article> used for self-contained content, such as blog posts. -->
<!-- <section> groups related content within the page -->
<!-- <aside> represents sidebar content, such as advertisements or related links. -->
<!-- <footer> contains copyright notices and extra information at the bottom. -->
