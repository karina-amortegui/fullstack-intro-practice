<!-- COMBINATORS
 - Define a relationship between two or more selectors. 
 - Target elements based on their relationship with other elements.
 - Descendent Selector, the ancestor descendant, targets all mathching elements.
 - Child Selectof, parent to child, targets direct children of the element.

 4 Combinators in CSS
 1) Descendent combinator (space)
    - Matches all elements that are descendents of a specified element.
    EX: div p {
            background-color: yellow;
            }
 2) Child combinator (>)
    - Selects all elements that are direct children of a specified element.
    EX: div > p {
    background-color: yellow;
    }
 3) Next sibling combinator (+)
    - Used to select an element that is directly after a specific element.
    EX: div + p {
            background-color: yellow;
            }
 4) Subsequent sibling combinator (~)
    - Selects all elements that are next siblings of a specified element.
    EX: div ~ p {
            background-color: yellow;
            }
 -->
