<!-- 
 PSEUDO-CLASSES
 
 - Apply styles when elements are in a certain state.
 - Hover, the mouse hover changes styles when the user hovers over an element.
-->

<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=devive-width, initial-scale=1.0">
        <title>Pseudo Classes</title>
        <style>
            button:hover {
                background-color: lightblue;
            }

            input:focus {
                border: 3px solid green;

            }

            li:nth-child(odd) {
                background-color: lightgrey;
            }
        </style>
    </head>
    <body>
        <button>hover me</button>
        <input type="text" placeholder="click here">

        <ul>
            <li>item 1</li>
            <li>item 2</li>
            <li>item 3</li>
        </ul>
    </body>
</html>
