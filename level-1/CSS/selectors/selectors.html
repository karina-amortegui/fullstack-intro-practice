<!-- 
 ***** CSS SELECTORS *****

Basic selectors 
    (universal, type, class, ID, attribute)
    (select elements based on name, id, class)
Combinators 
    (descendant, child, sibling)
    (select elements based on a specific relationship between them)
Pseudo-classes 
    (:hover, :focus, :nth-child)
    (select elements based on a certain state)
Pseudo-elements 
    (::before, ::after)
    (select and style a part of an element)
Attribute selectors
    (select elements based on an attribure or attribute value)


BASIC SELCTORS
Apply styles to elements based on:
- tag names
- IDs
    * The id of an element is unique within a page, so the id selector is used to select one unique element!
    * To select an element with a specific idm, write a hash(#) character, followed by a the id of the element.
    * EX: HTML element with id="para1"
        #para1 {
            text-align: center;
            color: red;
        }
- classes
    * Selects HTML elements with a specific class attribute.
    * To selelct elements with a specific class, write a period (.) character, followed by the class name.
    * EX: All HTML elements with class="center"
        .center {
            text-align: center;
            color: red;
            }

- attributes
--> 

<!--  
Universal Selector (* {}) 
Removes default margin padding from all elements in example below:

----- Basic Selector -----

 <style>

            margin: 0;

            color: red;
        }
    </style>

<style>
    h1 {
        color: darkblue;
        font-size: 24px;
    }
    p {
     color: gray;

</style>

<!-- 
 
----- Attribute Selector -----

 (Target elements based on attributes and values.) -->
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Attribute Selector</title>
        <style>
            input[type="text"] {
                border: 2px solid blue;
            }

            input[type="password"] {
                border: 2px solid red;
            }
        </style>
    </head>
    <body>
       <input type="text" placeholder="Enter your name" />
       <input type="password" placehoder="Enter your password" />
    </body>
</html>
