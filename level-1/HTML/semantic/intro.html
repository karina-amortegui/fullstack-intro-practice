<!-- INTRODUCTION TO SEMANTIC HTML -->

<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewpoint" content="width"=device-width, initial-scale="1.0" />
        <title>Semantic HTML</title>
    </head>
    <body>
        <h1>Welcome to Semantic HTML</h1>
        <p>This is a simple example of sematic html elements</p>
    </body>

</html>


<!-- <!DOCTYPE html> declares the document as HTML5. -->
<!-- <html lang="en"> specifies that the content is in English. -->
<!-- <head> contains metadata like the title page. -->
<!-- <body> holds the visible content of the webpage -->
